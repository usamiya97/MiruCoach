<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Robot body -->
  <rect x="28" y="68" width="64" height="44" rx="16" fill="#FBD0DA"/>
  <rect x="36" y="74" width="48" height="32" rx="12" fill="#FDE8EE"/>

  <!-- Robot head -->
  <rect x="26" y="28" width="68" height="50" rx="18" fill="#F43F5E"/>
  <rect x="34" y="36" width="52" height="34" rx="12" fill="#FB7185" opacity="0.35"/>

  <!-- Eyes -->
  <circle cx="48" cy="56" r="9" fill="white"/>
  <circle cx="72" cy="56" r="9" fill="white"/>
  <circle cx="49.5" cy="57.5" r="5.5" fill="#9F1239"/>
  <circle cx="73.5" cy="57.5" r="5.5" fill="#9F1239"/>
  <circle cx="51" cy="55.5" r="2" fill="white"/>
  <circle cx="75" cy="55.5" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M50 70 Q60 77 70 70" stroke="#9F1239" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <circle cx="26" cy="50" r="7" fill="#FB7185"/>
  <circle cx="94" cy="50" r="7" fill="#FB7185"/>

  <!-- Antenna -->
  <rect x="57" y="12" width="6" height="18" rx="3" fill="#F43F5E"/>
  <circle cx="60" cy="10" r="6" fill="#FB7185"/>

  <!-- Arms -->
  <rect x="8" y="74" width="22" height="14" rx="7" fill="#FBD0DA"/>
  <rect x="90" y="74" width="22" height="14" rx="7" fill="#FBD0DA"/>

  <!-- Cap brim -->
  <ellipse cx="60" cy="30" rx="36" ry="8" fill="#9F1239"/>
  <rect x="24" y="22" width="72" height="14" rx="7" fill="#9F1239"/>

  <!-- Cap top -->
  <rect x="30" y="10" width="60" height="20" rx="10" fill="#BE123C"/>

  <!-- Whistle -->
  <circle cx="60" cy="90" r="7" fill="#F43F5E"/>
  <rect x="57" y="86" width="6" height="5" rx="2.5" fill="#9F1239"/>
</svg>
